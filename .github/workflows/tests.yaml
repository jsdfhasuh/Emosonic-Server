# Inspired by python-package

name: CI
on:
  push:
    paths:
      - supysonic/**
      - tests/**
      - script/**
      - requirements.txt
      - ci-requirements.txt
      - pyproject.toml
      - setup.cfg
      - setup.py
      - Dockerfile
      - setup.sh
      - config.sample
      - .github/workflows/**
  pull_request:
    paths:
      - supysonic/**
      - tests/**
      - script/**
      - requirements.txt
      - ci-requirements.txt
      - pyproject.toml
      - setup.cfg
      - setup.py
      - Dockerfile
      - setup.sh
      - config.sample
      - .github/workflows/**

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ci-requirements.txt

      - name: Run tests
        run: |
          coverage run -m unittest
          coverage run -a -m unittest tests.net.suite

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ !cancelled() }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t emosonic-server:test .
