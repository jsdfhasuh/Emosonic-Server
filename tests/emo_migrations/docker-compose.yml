services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: supysonic_clean
      POSTGRES_PASSWORD: supysonic
      POSTGRES_USER: supysonic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supysonic -d supysonic_clean"]
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: supysonic_clean
      MARIADB_PASSWORD: supysonic
      MARIADB_ROOT_PASSWORD: supysonic-root
      MARIADB_USER: supysonic
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/mysql

  postgres-test:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGDATABASE: supysonic_clean
      PGHOST: postgres
      PGPASSWORD: supysonic
      PGUSER: supysonic
    volumes:
      - ../..:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/tests/emo_migrations/postgres.sh"]

  mariadb-test:
    image: mariadb:11.4
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_PWD: supysonic-root
      MYSQL_USER: root
    volumes:
      - ../..:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/tests/emo_migrations/mariadb.sh"]
